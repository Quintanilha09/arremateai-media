server.port=8083
spring.application.name=arremateai-media

# Multipart upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=510MB
spring.servlet.multipart.max-request-size=520MB

# Storage configuration
app.media.storage-location=./uploads
app.media.base-url=${MEDIA_BASE_URL:http://localhost:8083}

# Max allowed sizes (bytes)
app.media.max-image-size=5242880
app.media.max-video-size=524288000
app.media.max-avatar-size=2097152

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.arremateai.media=INFO
